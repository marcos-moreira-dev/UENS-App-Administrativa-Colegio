# ============================================================
# UENS Desktop - API client base configuration
# ============================================================
# Este archivo define el endpoint por defecto del backend y timeout HTTP.
# Puede ajustarse por entorno o sobreescribirse en runtime si el cliente
# soporta configuracion externa.

# URL base del backend (sin slash final).
# En local normalmente apunta al backend en host.
uens.api.baseUrl=http://localhost:8080

# Timeout global de llamadas HTTP del desktop.
# Un valor muy bajo genera falsos errores de red; uno muy alto
# oculta problemas reales de conectividad.
uens.api.timeoutSeconds=15
