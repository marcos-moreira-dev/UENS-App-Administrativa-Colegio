# ============================================================
# UENS Backend - application.properties (base comun)
# ============================================================
# Este archivo define configuracion transversal para todos los perfiles.
# Recomendacion:
# - deja aqui parametros estables del sistema
# - mueve ajustes de entorno (DB, tuning) a application-<profile>.properties
# - usa variables de entorno para secretos

# ------------------------------------------------------------
# Identidad de la aplicacion y carga de .env local
# ------------------------------------------------------------
spring.application.name=uens-backend

# Permite leer ".env" local en formato properties si existe.
# Es opcional para no romper en CI o entornos donde no hay archivo.
spring.config.import=optional:file:.env[.properties]

# Puerto HTTP del backend (override por APP_PORT).
server.port=${APP_PORT:8080}

# Perfil por defecto si no se define SPRING_PROFILES_ACTIVE.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# ------------------------------------------------------------
# Seguridad JWT / sesion renovable
# ------------------------------------------------------------
# Clave usada para firmar JWT. En produccion debe venir de secret manager.
app.security.jwt.secret=${JWT_SECRET:dev-only-secret-change-in-production}

# Vida util del access token (segundos).
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# Emisor del token (issuer claim).
app.security.jwt.issuer=${JWT_ISSUER:uens-backend}

# Toggle global del flujo refresh token.
app.security.refresh-token.enabled=${REFRESH_TOKEN_ENABLED:true}

# Vida util del refresh token (segundos). Default: 7 dias.
app.security.refresh-token.expiration-seconds=${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}

# Entropia del refresh token en bytes antes de codificar.
app.security.refresh-token.token-bytes-length=${REFRESH_TOKEN_BYTES_LENGTH:48}

# ------------------------------------------------------------
# Proteccion de login (anti brute-force y anti abuso)
# ------------------------------------------------------------
app.security.login-protection.enabled=${LOGIN_PROTECTION_ENABLED:true}

# Maximo de fallos por usuario/origen dentro de ventana de fallos.
app.security.login-protection.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}

# Ventana temporal de conteo de fallos.
app.security.login-protection.failure-window-seconds=${LOGIN_FAILURE_WINDOW_SECONDS:900}

# Tiempo de bloqueo tras superar intentos fallidos.
app.security.login-protection.lock-duration-seconds=${LOGIN_LOCK_DURATION_SECONDS:900}

# Rate limit por IP para endpoint de login.
app.security.login-protection.max-requests-per-ip-window=${LOGIN_MAX_REQUESTS_PER_IP_WINDOW:20}
app.security.login-protection.ip-window-seconds=${LOGIN_IP_WINDOW_SECONDS:300}

# ------------------------------------------------------------
# CORS y encabezados HTTP de seguridad
# ------------------------------------------------------------
app.security.cors.enabled=${CORS_ENABLED:true}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Request-Id}
app.security.cors.exposed-headers=${CORS_EXPOSED_HEADERS:X-Request-Id,Content-Disposition}
app.security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}
app.security.cors.max-age-seconds=${CORS_MAX_AGE_SECONDS:1800}

# HSTS solo debe activarse cuando TODO el trafico ya es HTTPS.
app.security.headers.hsts-enabled=${HSTS_ENABLED:false}
app.security.headers.hsts-max-age-seconds=${HSTS_MAX_AGE_SECONDS:31536000}
app.security.headers.hsts-include-subdomains=${HSTS_INCLUDE_SUBDOMAINS:true}

# Politicas defensivas de navegadores modernos.
app.security.headers.referrer-policy=${SECURITY_REFERRER_POLICY:no-referrer}
app.security.headers.permissions-policy=${SECURITY_PERMISSIONS_POLICY:camera=(), microphone=(), geolocation=(), payment=(), usb=()}

# ------------------------------------------------------------
# Cola de reportes asinc (scheduler/worker)
# ------------------------------------------------------------
# Habilita polling interno que reclama y procesa solicitudes.
app.report.queue.enabled=true

# Delays del scheduler.
app.report.queue.initial-delay-ms=5000
app.report.queue.fixed-delay-ms=10000
app.report.queue.scheduler-pool-size=2

# Control de lote e intentos.
app.report.queue.claim-batch-size=10
app.report.queue.max-attempts=3

# Directorio local de salida de archivos y politicas de retencion.
app.report.output.dir=reportes-output
app.report.output.public-base-url=
app.report.output.file-ttl-days=30
app.report.output.max-file-mb=20

# ------------------------------------------------------------
# OpenAPI (metadatos de documentacion)
# ------------------------------------------------------------
app.openapi.title=UENS Backend API
app.openapi.description=API del Sistema UE Ninitos Sonadores
app.openapi.version=v1

# ------------------------------------------------------------
# Logging y trazabilidad por requestId
# ------------------------------------------------------------
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.marcosmoreiradev.uensbackend=${LOG_LEVEL_APP:INFO}

# Incluye requestId del MDC para correlacionar logs y errores API.
logging.pattern.level=%5p [req:%X{requestId:-na}]

# Archivo principal + rolling diario por tamano.
logging.file.name=${LOG_FILE_PATH:logs/uens-backend.log}
logging.logback.rollingpolicy.file-name-pattern=logs/uens-backend.%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=250MB
