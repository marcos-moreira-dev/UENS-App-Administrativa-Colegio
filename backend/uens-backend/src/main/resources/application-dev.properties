# ============================================================
# Perfil "dev"
# ============================================================
# Configuracion usada en desarrollo local.
# Aqui se apunta a PostgreSQL y se valida esquema existente.

# ------------------------------------------------------------
# Datasource PostgreSQL
# ------------------------------------------------------------
# Permite override por variables de entorno:
# - DB_HOST
# - DB_PORT
# - DB_NAME
# - DB_USER
# - DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:SchoolManagerNinitosSonadores}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
# validate: verifica que tablas/columnas existan segun mapeos JPA.
# No crea ni altera esquema (mas seguro para no romper datos).
spring.jpa.hibernate.ddl-auto=validate

# Desactivar Open Session in View evita consultas perezosas fuera de servicio.
spring.jpa.open-in-view=false

# Esquema por defecto en PostgreSQL.
spring.jpa.properties.hibernate.default_schema=public

