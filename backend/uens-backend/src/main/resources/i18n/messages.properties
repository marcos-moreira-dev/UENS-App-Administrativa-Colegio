# ============================================================
# Message bundle default (English)
# ============================================================
# Convencion de claves:
# - api.success.* : mensajes de exito
# - error.vr.*    : validation rules (VR)
# - error.api.*   : errores de capa HTTP/API
# - error.auth.*  : autenticacion/autorizacion
# - error.sys.*   : errores internos del sistema
#
# Nota operativa:
# Mantener las claves estables permite mapear errores por codigo sin acoplarse
# a texto literal del mensaje.

# Success messages
api.success.default=Operation completed successfully.
api.success.created=Resource created successfully.
api.success.accepted=Request accepted for processing.

# Validation errors (VR)
error.vr.01.request_invalido=The request contains validation errors.
error.vr.02.parametro_invalido=Invalid request parameter.
error.vr.03.cuerpo_json_invalido=Invalid JSON body.
error.vr.06.valor_enum_invalido=Invalid enum value.
error.vr.07.campo_requerido=A required field is missing.

# API / HTTP errors
error.api.01.request_malformado=The request is malformed.
error.api.03.tipo_contenido_no_soportado=Unsupported media type.
error.api.04.recurso_no_encontrado=The requested resource was not found.
error.api.05.metodo_no_permitido=HTTP method not allowed.
error.api.06.ruta_no_encontrada=Route not found.
error.api.07.conflicto_operacion=The operation cannot be completed due to a conflict.
error.api.08.respuesta_no_aceptable=No acceptable representation available for the requested Accept header.
error.api.10.endpoint_en_construccion=Endpoint under construction.

# Auth / security errors
error.auth.01.credenciales_invalidas=Invalid credentials.
error.auth.02.token_invalido=Invalid token.
error.auth.03.token_expirado=Expired token.
error.auth.04.sin_permisos=Insufficient permissions.
error.auth.05.usuario_inactivo=Inactive user.
error.auth.06.login_temporalmente_bloqueado=Too many failed login attempts. Please wait before trying again.
error.auth.07.rate_limit_login_excedido=Too many login requests from the same origin. Please wait before trying again.
error.auth.08.refresh_token_invalido=Invalid refresh token.
error.auth.09.refresh_token_expirado=Expired refresh token.
error.auth.10.acceso_denegado=Access denied.

# System errors
error.sys.01.error_interno=An internal error occurred.
