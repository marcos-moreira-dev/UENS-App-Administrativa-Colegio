# ============================================================
# Perfil "default"
# ============================================================
# Este perfil permite que la app arranque en modo minimo sin datasource.
# Es util para:
# - validaciones de bootstrap
# - ejecuciones donde no hay DB disponible
# - pruebas de wiring basico
#
# Importante:
# Los casos de uso reales de negocio requieren perfil "dev" o "prod".
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
