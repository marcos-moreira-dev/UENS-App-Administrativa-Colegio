# ============================================================
# Perfil "prod"
# ============================================================
# Ajustes de produccion:
# - DB real via variables de entorno
# - validacion de esquema sin auto-migrar
# - sin Open Session in View
#
# Recomendacion:
# Gestiona secretos con vault/secret manager, no en archivos versionados.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:SchoolManagerNinitosSonadores}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
